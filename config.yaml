# A股投资分析助手 — 个人风格配置
# 修改后无需改代码,daily_report.py 会自动读取

style:
  trading_style: 短线+波段      # 短线 / 波段 / 中长线(可组合)
  preference: [题材成长股, 不限看信号]
  max_drawdown_pct: 8          # 单只个股最大回撤容忍(%),超过即建议止损

filters:                       # 硬性排除(代码层一票否决)
  exclude_st: true             # ST / *ST 股
  exclude_sub_new: true       # 上市不满 60 日次新股
  exclude_bse: true           # 北交所(代码 8/4/92 开头)
  exclude_chinext: true        # 创业板(代码 300/301 开头)
  exclude_star: true           # 科创板(代码 688/689 开头,无购买资格则排除)

hard_rules:                    # 信号级硬规则(不剔除,但禁止给"关注"信号)
  max_bias5_pct: 5             # MA5 乖离率 > 5% 不追高
  max_rsi6: 80                 # RSI6 > 80 超买不碰

report:
  top_sectors: 5               # 每日分析涨幅前 N 个板块(候选漏斗宽度;最终荐股仍由 max_picks 封顶)
  stocks_per_sector: 5         # 每板块按成交额取前 M 只进候选池
  min_score: 60                # 进入荐股池的最低评分
  max_picks: 5                 # 单日荐股池上限(防信息过载)
  total_assets: 100000         # ← 示例占位值,请在本地改成你的实际总资产(隐私:勿把真实值提交到公开仓库)。总资产(元,现金+持仓市值)是作战方案换股/建仓的"可负担"过滤基准:1手(100股)金额 > 总资产×lot_afford_ratio 的标的从换股候选剔除并标注(实操可先卖后买腾资金,故按家底而非可用现金比较)。设 null 则只标注1手金额不过滤
  lot_afford_ratio: 0.6        # 单只1手金额占总资产上限:超过视为"1手都占过半仓,太重",从换股候选剔除。默认0.6
  kline_days: 180              # 拉取日K长度
  chart_bars: 120              # 富HTML K线图展示的最近K线根数
  min_sector_size: 15          # 板块容量门槛(方案A):成分股数 < 此值的板块不进候选,滤掉"伪板块脉冲";设0关闭。数据源没给容量字段的板块不误杀
  sector_size_weight: 3.0      # 板块容量权重(方案B):排序分 = 强弱分 + log10(成分数)×此值,大容量同等强度优先;设0关闭。仅影响排序,不改强/中/弱评级
  scan_concepts: true          # 概念板块并轨(方案C):扫同花顺概念热题材,热榜展示 + 概念内个股纳入荐股池(标注概念来源);设false关闭
  top_concepts: 3              # 取(过滤后)涨幅前 N 个热门概念做选股
  concept_max_size: 400        # 概念容量上限:成分 > 此值视为指数化伪概念(机器人概念1209/人工智能1077/融资融券3848 等)排除;下限复用 min_sector_size
  concept_blacklist:           # 成分名单式伪概念黑名单(非可交易题材),按子串匹配
    [融资融券, 深股通, 沪股通, 深港通, 沪港通, 国企改革, 专精特新, 一带一路, 破净, 转融券,
     MSCI, 富时, 标普, QFII, 预盈预增, 预亏预减, 昨日涨停, 央企, 注册制, 机构重仓, 基金重仓,
     社保, 同花顺, 中字头, 微盘股, 小盘, 大盘, 高股息, 参股]

global_scan:                   # 全局扫描(热点板块之外的全市场上升趋势股)
  universe_ttl_days: 5         # 全市场清单缓存天数(周级刷新,避免每次重拉5000只)
  scan_cap: 60                 # 预筛后拉K线的候选上限(越大越全但越慢/越易限流)
  min_60d_return: 10           # (预留)中期涨幅门槛(%)
  min_score: 65                # 趋势追涨路的入池评分门槛
  max_picks: 8                 # 每一路(趋势/超跌)的上限
  oversold_rsi: 35             # 超跌回调路:RSI6 ≤ 此值视为超卖
  oversold_bias: -8            # 超跌回调路:MA5乖离 ≤ 此值视为深度负乖离
  rps_min: 85                  # 趋势路:全市场60日涨幅百分位RPS≥此值(欧奈尔,需东财spot的60日字段)
  event_filter: true           # 第三梯队:盘前拉解禁/业绩雷黑名单剔除
  event_days_ahead: 14         # 未来N天内大额解禁纳入黑名单
  unlock_ratio_pct: 3.0        # 解禁占流通市值 > 此% 视为大额

watch:                         # 盘中监控(watch.py):盯持仓+荐股,触及作战方案计划价位→桌面弹窗
  interval_sec: 20             # 轮询间隔(秒),建议 15~30(省心且不触限流)
  max_alerts_per_type: 3      # 每股每类告警每日上限(防"每3秒焦虑一次"轰炸)
  near_pct: 0.3               # 触发缓冲:现价接近计划价 此%(0.3=千分之三)即预警,不必精确打到
  trading_hours_only: true    # 仅 9:30-11:30 / 13:00-15:00 轮询(--once 时忽略)

data:
  request_interval_sec: 1.0    # 接口调用间隔(秒),实际会 +0~50% 随机抖动;防限流
  max_retries: 2               # 单接口重试次数(压低:限流时靠缓存兜底,不狂重试续封禁)
  freshness_max_age_days: 4    # 数据超过 N 天视为过期,拒绝出结论(缓存陈旧数据在此被拦)
  prefer_source: eastmoney     # 板块数据主源:eastmoney(全,含领涨股) / danginvest(避开东财限流,更稳)。失败自动互备;东财板块clist限流时会自动降级到DangInvest
  danginvest_mode: industry    # DangInvest 板块维度:industry申万大类 / sub同花顺细分 / concept概念
